<!DOCTYPE html>
<html lang="en">
<head>
    <title>Contact Us</title>
    <link rel="stylesheet" href="../css/contact.css">
</head>
<body>
    <div id="navbar"></div>
    <section class="contact-section">
  <h2>Contact Us</h2>
  <p class="contact-subtitle">
    Have a question or want to collaborate? Reach out to Prakriti 🌱
  </p>

  <div class="contact-container">

    <!-- FORM -->
    <div class="contact-form">
      <form>
        <input type="text" placeholder="Your Name" required>
        <input type="email" placeholder="Your Email" required>
        <input type="text" placeholder="Subject">
        <textarea placeholder="Your Message" rows="5"></textarea>
        <button type="submit">Send Message</button>
      </form>
    </div>

    <!-- INFO -->
    <div class="contact-info">
      <h3>Reach Us</h3>
      <p>📍 NIT Durgapur, West Bengal</p>
      <p>📧 prakriti@nitdgp.ac.in</p>
      <p>📞 +91 9XXXXXXXXX</p>

      <div class="social-links">
        <a href="#">Instagram</a>
        <a href="#">LinkedIn</a>
        <a href="#">Twitter</a>
      </div>
    </div>

  </div>
</section>
<iframe
  src="https://www.google.com/maps?q=NIT%20Durgapur&output=embed"
  width="100%"
  height="200"
  style="border:0; margin-top:20px;"
  allowfullscreen
></iframe>
    <script src="../script/script.js"></script>
</body>
</html>
